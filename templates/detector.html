<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTIGRAVITY AI - 객체 탐지 감별관</title>
    <!-- 구글 모던 폰트 (Outfit) 불러오기 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- 스타일시트 연결 -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 배경 네온 빛 효과 -->
    <div class="background-glow glow-1"></div>
    <div class="background-glow glow-2"></div>

    <!-- 메인 컨테이너 (유리 카드 효과) -->
    <main class="glass-card" style="max-width: 850px;">
        <header class="header">
            <span class="badge" style="background: linear-gradient(90deg, #7928CA, #FF0080); color: white; border: none;">OBJECT DETECTION v8.0</span>
            <h1>🔍 AI 객체 탐지 쇼룸</h1>
            <p>사진 속에 있는 여러 물체들의 위치를 찾아서 실시간으로 네모 박스를 치고 이름표를 붙여드립니다.</p>
            <div style="margin-top: 1.2rem; display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap;">
                <a href="/" style="display: inline-block; background: rgba(255,255,255,0.1); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2); transition: background 0.2s;">🏠 이미지 분류 로비로 이동</a>
            </div>
        </header>

        <!-- 이미지 업로드 영역 -->
        <section class="upload-section">
            <label for="file-input" id="drop-zone" class="drop-zone" style="display: block; cursor: pointer;">
                <div class="icon-container" style="color: #FF0080;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                </div>
                <h3>여기에 탐지할 사진을 놓거나 클릭하세요</h3>
                <p class="sub-text">숨은그림찾기처럼 물체들의 정확한 좌표를 찾아냅니다 (JPG, PNG)</p>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
            </label>
        </section>

        <!-- 이미지 및 캔버스 오버레이 미리보기 영역 -->
        <section id="preview-section" class="preview-section hidden" style="text-align: center;">
            <!-- 이미지 위에 캔버스를 포개어 놓는 래퍼 영역 -->
            <div class="canvas-wrapper" id="canvas-wrapper">
                <img id="detector-image" src="" alt="탐지 대상 이미지">
                <canvas id="detector-canvas"></canvas>
                <div id="loading-spinner" class="spinner-overlay hidden">
                    <div class="spinner" style="border-top-color: #FF0080;"></div>
                    <p>YOLOv8 탐정이 사진 속 물체들의 좌표를 찾는 중...</p>
                </div>
            </div>
            <div style="margin-top: 1.5rem;">
                <button id="reset-btn" class="reset-btn" style="background: linear-gradient(90deg, #7928CA, #FF0080);">다른 사진 탐지하기</button>
            </div>
        </section>

        <!-- 탐지 결과 요약 및 목록 영역 -->
        <section id="result-section" class="result-section hidden">
            <!-- 요약 안내 배너 -->
            <div id="detect-summary" class="detect-summary"></div>
            
            <!-- 탐지된 물체 칩 목록 -->
            <div id="detect-grid" class="detect-grid"></div>
        </section>
    </main>

    <!-- 객체 탐지 전용 자바스크립트 연결 -->
    <script src="/static/detector.js"></script>
</body>
</html>
