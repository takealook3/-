<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTIGRAVITY AI - 포즈 추정 관절 스캐너</title>
    <!-- 구글 모던 폰트 (Outfit) 불러오기 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- 공통 스타일시트 연결 -->
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* 포즈 추정 페이지 전용 추가 스타일 (비유: 관절 진료실 전용 인테리어) */
        .person-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 1rem;
            text-align: left;
        }
        .person-title {
            color: #00F0FF;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .keypoint-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.6rem;
        }
        .keypoint-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 0.5rem;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
        }
        .kp-name {
            color: #ccc;
            font-weight: 600;
        }
        .kp-coord {
            color: #00DF89;
            font-family: monospace;
            margin-top: 0.2rem;
        }
    </style>
</head>
<body>
    <!-- 배경 네온 빛 효과 -->
    <div class="background-glow glow-1"></div>
    <div class="background-glow glow-2"></div>

    <!-- 메인 컨테이너 (유리 카드 효과) -->
    <main class="glass-card" style="max-width: 850px;">
        <header class="header">
            <span class="badge" style="background: linear-gradient(90deg, #00F0FF, #00DF89); color: #000; font-weight: 800; border: none;">POSE ESTIMATION v8.0</span>
            <h1>🦴 AI 포즈 추정 (사람 관절 탐지)</h1>
            <p>사진 속 사람을 인식하여 17개 핵심 관절 위치를 찾고 디지털 뼈대를 실시간으로 스캔해 드립니다.</p>
            <div style="margin-top: 1.2rem; display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap;">
                <a href="/" style="display: inline-block; background: rgba(255,255,255,0.1); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2); transition: background 0.2s;">🏠 메인 로비</a>
                <a href="/detector" style="display: inline-block; background: rgba(255,255,255,0.1); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2); transition: background 0.2s;">🔍 객체 탐지</a>
            </div>
        </header>

        <!-- 이미지 업로드 영역 -->
        <section class="upload-section">
            <label for="file-input" id="drop-zone" class="drop-zone" style="display: block; cursor: pointer;">
                <div class="icon-container" style="color: #00F0FF;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><line x1="12" y1="8" x2="12" y2="14"/><line x1="16" y1="10" x2="8" y2="10"/><line x1="12" y1="14" x2="9" y2="21"/><line x1="12" y1="14" x2="15" y2="21"/></svg>
                </div>
                <h3>여기에 분석할 사람 사진을 놓거나 클릭하세요</h3>
                <p class="sub-text">머리부터 발끝까지 17개 관절 좌표를 정밀 스캔합니다 (JPG, PNG)</p>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
            </label>
        </section>

        <!-- 뼈대 시각화 미리보기 영역 -->
        <section id="preview-section" class="preview-section hidden" style="text-align: center;">
            <div class="canvas-wrapper" id="canvas-wrapper" style="position: relative; display: inline-block;">
                <!-- 뼈대가 그려진 결과 이미지가 여기에 표시됩니다 -->
                <img id="pose-image" src="" alt="포즈 추정 결과" style="max-width: 100%; border-radius: 12px; box-shadow: 0 8px 32px rgba(0, 240, 255, 0.2);">
                <div id="loading-spinner" class="spinner-overlay hidden">
                    <div class="spinner" style="border-top-color: #00F0FF;"></div>
                    <p>AI 화가(YOLOv8-Pose)가 관절을 찾고 뼈대를 그리는 중...</p>
                </div>
            </div>
            <div style="margin-top: 1.5rem;">
                <button id="reset-btn" class="reset-btn" style="background: linear-gradient(90deg, #00F0FF, #00DF89); color: #000; font-weight: 800;">다른 사진 스캔하기</button>
            </div>
        </section>

        <!-- 관절 좌표 결과 분석 영역 -->
        <section id="result-section" class="result-section hidden">
            <div id="pose-summary" class="detect-summary"></div>
            <!-- 사람별 관절 데이터가 여기에 동적으로 생성됩니다 -->
            <div id="pose-container"></div>
        </section>
    </main>

    <!-- 포즈 추정 전용 자바스크립트 연결 -->
    <script src="/static/pose.js"></script>
</body>
</html>
