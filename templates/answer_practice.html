<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💘 여친의 곤란한 질문 생존 모의고사</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.18);
            --primary-pink: #ec4899;
            --primary-purple: #8b5cf6;
            --accent-glow: rgba(236, 72, 153, 0.4);
            --text-main: #f8fafc;
            --text-sub: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: floatOrb 10s ease-in-out infinite alternate;
            pointer-events: none; /* 클릭 방해 금지 */
        }
        .orb-1 {
            width: 300px;
            height: 300px;
            background: var(--primary-pink);
            top: 10%;
            left: 15%;
            opacity: 0.35;
        }
        .orb-2 {
            width: 400px;
            height: 400px;
            background: var(--primary-purple);
            bottom: 10%;
            right: 10%;
            opacity: 0.35;
            animation-delay: -5s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -50px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 750px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px var(--accent-glow);
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #f472b6, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-sub);
            font-size: 1rem;
        }

        .question-box {
            background: rgba(0, 0, 0, 0.35);
            border: 2px solid var(--primary-pink);
            border-radius: 16px;
            padding: 1.8rem;
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: inset 0 0 20px rgba(236, 72, 153, 0.2);
        }

        .question-label {
            display: inline-block;
            background: var(--primary-pink);
            color: white;
            font-size: 0.85rem;
            font-weight: 800;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            margin-bottom: 1rem;
            box-shadow: 0 0 10px var(--primary-pink);
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            line-height: 1.5;
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: keep-all;
        }

        .input-section {
            margin-bottom: 2rem;
        }

        textarea {
            width: 100%;
            height: 130px;
            background: rgba(15, 23, 42, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 1.2rem;
            color: white;
            font-size: 1.05rem;
            resize: none;
            transition: all 0.3s;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary-purple);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        textarea::placeholder {
            color: #94a3b8;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.2rem;
        }

        /* 버튼 기본 스타일 개선 */
        button, .btn {
            flex: 1;
            padding: 1.1rem;
            border: none;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            user-select: none;
        }

        .btn-random {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-random:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary-pink), var(--primary-purple));
            color: white;
            box-shadow: 0 10px 20px -5px rgba(236, 72, 153, 0.6);
        }

        .btn-submit:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px -5px rgba(236, 72, 153, 0.8);
        }

        button:active {
            transform: translateY(1px) scale(0.97) !important;
        }

        #result-box {
            display: none;
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid rgba(236, 72, 153, 0.4);
            border-radius: 16px;
            padding: 2rem;
            animation: slideUp 0.5s ease;
            line-height: 1.7;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #result-box h1, #result-box h2, #result-box h3 {
            color: #f472b6;
            margin-top: 1.5rem;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.3rem;
        }

        #result-box h1:first-child, #result-box h2:first-child {
            margin-top: 0;
        }

        #result-box strong { color: #38bdf8; }
        #result-box ul, #result-box ol { margin-left: 1.5rem; margin-bottom: 1rem; }
        #result-box li { margin-bottom: 0.5rem; }

        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .container { padding: 1.5rem; }
            header h1 { font-size: 1.5rem; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <header>
            <h1>💘 여친의 곤란한 질문 생존 모의고사</h1>
            <p>AI 여자친구의 숨막히는 질문! 당신의 연애 생존 점수는 몇 점일까요?</p>
        </header>

        <div class="question-box">
            <div class="question-label">MISSION QUESTION</div>
            <div class="question-text" id="question-display">
                질문을 불러오는 중입니다... 🎲
            </div>
        </div>

        <div class="input-section">
            <textarea id="user-answer" placeholder="여기에 센스 넘치는 답변을 입력하세요!&#13;&#10;(예: 당연히 우리 자기가 세상에서 제일 중요하지!)"></textarea>
            
            <div class="button-group">
                <button type="button" class="btn btn-random" id="btn-random" onclick="fetchRandomQuestion()">
                    🎲 랜덤 질문 생성
                </button>
                <button type="button" class="btn btn-submit" id="btn-submit" onclick="submitAnswer()">
                    💌 AI 코치에게 평가받기
                </button>
            </div>
        </div>

        <div id="result-box"></div>
    </div>

    <script>
        const questionDisplay = document.getElementById("question-display");
        const userAnswerInput = document.getElementById("user-answer");
        const btnRandom = document.getElementById("btn-random");
        const btnSubmit = document.getElementById("btn-submit");
        const resultBox = document.getElementById("result-box");

        let currentQuestion = "";
        let isFetching = false;

        async function fetchRandomQuestion() {
            if (isFetching) return;
            isFetching = true;
            
            btnRandom.innerHTML = '<span class="spinner"></span> 질문 뽑는 중...';
            questionDisplay.style.opacity = 0.5;
            resultBox.style.display = "none";
            userAnswerInput.value = "";

            try {
                const response = await fetch("/api/generate-question", { method: "POST" });
                const data = await response.json();

                if (data.status === "success") {
                    currentQuestion = data.question;
                    questionDisplay.textContent = `"${currentQuestion}"`;
                    questionDisplay.style.opacity = 1;
                } else {
                    questionDisplay.textContent = "❌ 질문을 불러오지 못했습니다. 버튼을 다시 눌러주세요.";
                }
            } catch (error) {
                questionDisplay.textContent = "❌ 서버 통신 오류가 발생했습니다.";
                console.error("Error:", error);
            } finally {
                btnRandom.innerHTML = '🎲 랜덤 질문 생성';
                isFetching = false;
            }
        }

        async function submitAnswer() {
            const userAnswer = userAnswerInput.value.trim();
            
            // 답변을 적지 않았을 때 친절한 경고창 띄우기
            if (!userAnswer) {
                alert("💡 앗! 센스 있는 답변을 입력창에 먼저 적어주세요!");
                userAnswerInput.focus();
                return;
            }
            if (!currentQuestion || currentQuestion.includes("불러오는 중")) {
                alert("💡 먼저 [랜덤 질문 생성] 버튼을 눌러 질문을 뽑아주세요!");
                return;
            }

            if (isFetching) return;
            isFetching = true;

            btnSubmit.innerHTML = '<span class="spinner"></span> AI 코치 채점 중...';
            resultBox.style.display = "block";
            resultBox.innerHTML = '<div style="text-align:center; padding: 2rem;"><span class="spinner" style="width:40px; height:40px; border-width:4px;"></span><p style="margin-top:1rem; color:#f472b6; font-weight:bold; font-size:1.1rem;">연애 코치가 당신의 답변을 날카롭게 분석하고 있습니다...</p></div>';

            try {
                const response = await fetch("/api/evaluate-answer", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        question: currentQuestion,
                        user_answer: userAnswer
                    })
                });
                const data = await response.json();

                if (data.status === "success") {
                    resultBox.innerHTML = marked.parse(data.evaluation);
                    resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    resultBox.innerHTML = '<p style="color:#ef4444; font-weight:bold;">❌ 평가 생성 실패: 잠시 후 다시 시도해주세요.</p>';
                }
            } catch (error) {
                resultBox.innerHTML = '<p style="color:#ef4444; font-weight:bold;">❌ 서버와 통신 중 오류가 발생했습니다.</p>';
                console.error("Error:", error);
            } finally {
                btnSubmit.innerHTML = '💌 AI 코치에게 평가받기';
                isFetching = false;
            }
        }

        window.addEventListener("DOMContentLoaded", () => {
            fetchRandomQuestion();
        });
    </script>
</body>
</html>
