<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTIGRAVITY AI - AI 광학 문자 인식(OCR) 쇼룸</title>
    <!-- 구글 모던 폰트 (Outfit) 불러오기 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- 스타일시트 연결 -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 배경 네온 빛 효과 -->
    <div class="background-glow glow-1" style="background: radial-gradient(circle, #00F0FF, #00DF89);"></div>
    <div class="background-glow glow-2" style="background: radial-gradient(circle, #7928CA, #FF0080);"></div>

    <!-- 메인 컨테이너 (유리 카드 효과) -->
    <main class="glass-card" style="max-width: 900px;">
        <header class="header">
            <span class="badge" style="background: linear-gradient(90deg, #00F0FF, #00DF89); color: #000; font-weight: 800; border: none;">AI OPTICAL CHARACTER RECOGNITION</span>
            <h1>📖 AI 광학 문자 인식(OCR) 쇼룸</h1>
            <p>사진 속 간판, 문서, 메모에 적힌 한글과 영어 글자를 AI 속기사(EasyOCR)가 빠르고 정확하게 읽어 텍스트로 추출합니다.</p>
            <div style="margin-top: 1.2rem; display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap;">
                <a href="/" style="display: inline-block; background: rgba(255,255,255,0.1); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2); transition: background 0.2s;">🏠 홈으로 이동</a>
                <a href="/demo_multi_apis" style="display: inline-block; background: rgba(255,255,255,0.1); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2); transition: background 0.2s;">🚀 스마트 파이프라인</a>
                <a href="/detector" style="display: inline-block; background: rgba(255,255,255,0.1); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2); transition: background 0.2s;">🔍 AI 객체 탐지</a>
            </div>
        </header>

        <!-- 이미지 업로드 영역 -->
        <section class="upload-section">
            <label for="file-input" id="drop-zone" class="drop-zone" style="display: block; cursor: pointer; border-color: rgba(0, 240, 255, 0.4);">
                <div class="icon-container" style="color: #00F0FF;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                </div>
                <h3>여기에 글자가 있는 사진을 놓거나 클릭하세요</h3>
                <p class="sub-text">한글 및 영어 문서를 AI가 신속하게 판독하여 형광펜을 칠해드립니다 (JPG, PNG)</p>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
            </label>
        </section>

        <!-- 이미지 미리보기 및 로딩 상태 영역 -->
        <section id="preview-section" class="preview-section hidden" style="text-align: center;">
            <div class="image-wrapper" style="display: inline-block; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5); max-width: 100%;">
                <img id="ocr-image" src="" alt="OCR 판독 대상 이미지" style="max-height: 480px; width: auto; display: block; margin: 0 auto;">
                <div id="loading-spinner" class="spinner-overlay hidden">
                    <div class="spinner" style="border-top-color: #00F0FF;"></div>
                    <p>AI 속기사가 이미지 속 글자들을 타자로 치는 중...</p>
                </div>
            </div>
            <div style="margin-top: 1.5rem;">
                <button id="reset-btn" class="reset-btn" style="background: linear-gradient(90deg, #00F0FF, #00DF89); color: #000; font-weight: 800;">다른 사진 판독하기</button>
            </div>
        </section>

        <!-- OCR 추출 결과 출력 영역 -->
        <section id="result-section" class="result-section hidden" style="margin-top: 2rem;">
            <!-- 요약 안내 배너 -->
            <div id="ocr-summary" class="detect-summary" style="background: linear-gradient(135deg, rgba(0, 240, 255, 0.15), rgba(0, 223, 137, 0.15)); border-color: rgba(0, 240, 255, 0.4); color: #00F0FF;"></div>
            
            <!-- 전체 복사 버튼 -->
            <div style="text-align: right; margin-bottom: 1rem;">
                <button id="copy-all-btn" style="background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 0.5rem 1.2rem; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s;">📋 추출된 텍스트 전체 복사</button>
            </div>

            <!-- 추출된 글자 목록 리스트 -->
            <div id="ocr-items-container" style="display: flex; flex-direction: column; gap: 0.8rem;"></div>
        </section>
    </main>

    <!-- OCR 동작을 담당하는 자바스크립트 연결 -->
    <script src="/static/ocr.js"></script>
</body>
</html>
