<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTIGRAVITY AI - 이미지 감별 쇼룸</title>
    <!-- 구글 최신 모던 폰트 (Outfit) 불러오기 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- 스타일시트 연결 -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 배경에 흐르는 화려한 네온 빛 효과 (장식용) -->
    <div class="background-glow glow-1"></div>
    <div class="background-glow glow-2"></div>

    <!-- 메인 컨테이너 (반투명 유리 카드 효과가 적용될 영역) -->
    <main class="glass-card">
        <header class="header">
            <span class="badge">VISION AI v1.0</span>
            <h1>AI 이미지 감별 쇼룸</h1>
            <p>사진을 드래그하거나 클릭하여 업로드하면 최첨단 MobileNetV3 AI가 즉시 무엇인지 알아맞힙니다.</p>
            <div style="margin-top: 1.2rem; display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap;">
                <a href="/demo_multi_apis" style="display: inline-block; background: linear-gradient(90deg, #00F0FF, #00DF89, #FFAA00); color: #000; padding: 0.6rem 1.5rem; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 1rem; box-shadow: 0 0 25px rgba(0, 223, 137, 0.7); transition: transform 0.2s; border: 2px solid #fff;">🚀 스마트 파이프라인</a>
                <a href="/studio" style="display: inline-block; background: linear-gradient(90deg, #FF0080, #00F0FF, #00DF89); color: #000; padding: 0.6rem 1.5rem; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 1rem; box-shadow: 0 0 25px rgba(0, 240, 255, 0.7); transition: transform 0.2s; border: 2px solid #fff;">🌟 올인원 AI 스튜디오</a>
                <a href="/ocr" style="display: inline-block; background: linear-gradient(90deg, #00F0FF, #00DF89); color: #000; padding: 0.6rem 1.5rem; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 1rem; box-shadow: 0 0 25px rgba(0, 240, 255, 0.7); transition: transform 0.2s; border: 2px solid #fff;">📖 OCR 문자 인식</a>
                <a href="/detector" style="display: inline-block; background: linear-gradient(90deg, #7928CA, #FF0080); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(255, 0, 128, 0.5); transition: transform 0.2s; border: 1px solid rgba(255,255,255,0.3);">🔍 AI 객체 탐지</a>
                <a href="/pose" style="display: inline-block; background: linear-gradient(90deg, #00F0FF, #00DF89); color: #000; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(0, 240, 255, 0.5); transition: transform 0.2s;">🦴 포즈 추정</a>
                <a href="/face" style="display: inline-block; background: linear-gradient(90deg, #FF0080, #7928CA); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(255, 0, 128, 0.5); transition: transform 0.2s;">👥 얼굴 유사도</a>
                <a href="/game" style="display: inline-block; background: linear-gradient(90deg, #00df89, #007cf0); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(0, 223, 137, 0.4); transition: transform 0.2s;">🕹️ 가위바위보</a>
                <a href="/card" style="display: inline-block; background: linear-gradient(90deg, #ff007f, #7928CA); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4); transition: transform 0.2s;">🃏 카드 짝 맞추기</a>
                <a href="/survivor" style="display: inline-block; background: linear-gradient(90deg, #ffaa00, #ff007f); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(255, 170, 0, 0.4); transition: transform 0.2s;">🧙‍♂️ 뱀파이어 서바이벌</a>
            </div>
        </header>

        <!-- 이미지 드래그 앤 드롭 업로드 영역 -->
        <section class="upload-section">
            <label for="file-input" id="drop-zone" class="drop-zone" style="display: block; cursor: pointer;">
                <div class="icon-container">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </div>
                <h3>여기에 사진을 놓거나 클릭하세요</h3>
                <p class="sub-text">지원 형식: JPG, PNG, WEBP (최고 속도 판독)</p>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
            </label>
        </section>

        <!-- 업로드된 이미지 미리보기 및 로딩 상태 표시 영역 (처음엔 숨겨짐) -->
        <section id="preview-section" class="preview-section hidden">
            <div class="image-wrapper">
                <img id="preview-image" src="" alt="업로드 이미지 미리보기">
                <div id="loading-spinner" class="spinner-overlay hidden">
                    <div class="spinner"></div>
                    <p>AI가 사진을 돋보기로 분석 중...</p>
                </div>
            </div>
            <button id="reset-btn" class="reset-btn">다른 사진 감정하기</button>
        </section>

        <!-- AI 분석 결과가 나타날 그래프 영역 (처음엔 숨겨짐) -->
        <section id="result-section" class="result-section hidden">
            <h2>✨ AI 판독 결과 (상위 5개)</h2>
            <div id="predictions-list" class="predictions-list">
                <!-- 자바스크립트를 통해 결과 그래프가 여기에 자동으로 채워집니다 -->
            </div>
        </section>
    </main>

    <!-- 동작을 담당하는 자바스크립트 연결 -->
    <script src="/static/script.js"></script>
</body>
</html>
