<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTIGRAVITY AI - 얼굴 유사도 감정소</title>
    <!-- 구글 모던 폰트 (Outfit) 불러오기 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- 공통 스타일시트 연결 -->
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* 얼굴 유사도 감정소 전용 스타일 (비유: 관상 판정실 전용 인테리어) */
        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        @media (max-width: 650px) {
            .upload-grid { grid-template-columns: 1fr; }
        }
        .face-drop-zone {
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed rgba(255, 0, 128, 0.4);
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .face-drop-zone:hover, .face-drop-zone.dragover {
            background: rgba(255, 0, 128, 0.08);
            border-color: #FF0080;
            transform: translateY(-3px);
        }
        .preview-img-box {
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 1rem;
            background: rgba(0,0,0,0.4);
        }
        .preview-img-box img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }
        .compare-btn {
            background: linear-gradient(90deg, #FF0080, #7928CA);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 0, 128, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1.5rem;
        }
        .compare-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(255, 0, 128, 0.6);
        }
        .compare-btn:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .similarity-gauge-wrapper {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 2rem;
            margin-top: 2rem;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .verdict-text {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: #FF0080;
        }
        .gauge-bar-bg {
            background: rgba(0,0,0,0.5);
            height: 24px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            margin: 1rem 0;
        }
        .gauge-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00DF89, #00F0FF, #FF0080);
            border-radius: 12px;
            transition: width 1.2s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .sim-percentage {
            font-size: 2.5rem;
            font-weight: 800;
            color: #00F0FF;
            text-shadow: 0 0 10px rgba(0,240,255,0.5);
        }
    </style>
</head>
<body>
    <!-- 배경 네온 빛 효과 -->
    <div class="background-glow glow-1" style="background: radial-gradient(circle, rgba(255,0,128,0.2) 0%, rgba(0,0,0,0) 70%);"></div>
    <div class="background-glow glow-2" style="background: radial-gradient(circle, rgba(121,40,202,0.2) 0%, rgba(0,0,0,0) 70%);"></div>

    <!-- 메인 컨테이너 -->
    <main class="glass-card" style="max-width: 850px;">
        <header class="header">
            <span class="badge" style="background: linear-gradient(90deg, #FF0080, #7928CA); color: white; border: none;">YOLOv8 + INSIGHTFACE</span>
            <h1>👥 AI 얼굴 유사도 닮은꼴 감정소</h1>
            <p>두 사람의 얼굴 사진을 등록하면 AI 관상 감정사가 얼굴 고유 특징점을 비교하여 몇 % 닮았는지 분석해 줍니다.</p>
            <div style="margin-top: 1.2rem; display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap;">
                <a href="/" style="display: inline-block; background: rgba(255,255,255,0.1); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2);">🏠 메인 로비</a>
                <a href="/detector" style="display: inline-block; background: rgba(255,255,255,0.1); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2);">🔍 객체 탐지</a>
                <a href="/pose" style="display: inline-block; background: rgba(255,255,255,0.1); color: #ffffff; padding: 0.5rem 1.2rem; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2);">🦴 포즈 추정</a>
            </div>
        </header>

        <!-- 두 이미지 업로드 영역 -->
        <section class="upload-grid">
            <!-- 1번 기준 사진 -->
            <div>
                <h4 style="margin-bottom: 0.5rem; color: #ff80bf;">📸 [기준 사진] 1번 인물</h4>
                <label for="file-input-1" id="drop-zone-1" class="face-drop-zone" style="display: block;">
                    <div id="preview-box-1" class="preview-img-box hidden">
                        <img id="img-1" src="" alt="1번 인물">
                    </div>
                    <div id="placeholder-1">
                        <p style="font-weight: 700; color: #fff; margin-bottom: 0.3rem;">클릭하여 1번 사진 업로드</p>
                        <p style="font-size: 0.8rem; color: #aaa;">얼굴이 잘 보이는 정면 사진 권장</p>
                    </div>
                    <input type="file" id="file-input-1" accept="image/*" style="display: none;">
                </label>
            </div>

            <!-- 2번 비교 사진 -->
            <div>
                <h4 style="margin-bottom: 0.5rem; color: #00F0FF;">📸 [비교 사진] 2번 인물</h4>
                <label for="file-input-2" id="drop-zone-2" class="face-drop-zone" style="display: block; border-color: rgba(0, 240, 255, 0.4);">
                    <div id="preview-box-2" class="preview-img-box hidden">
                        <img id="img-2" src="" alt="2번 인물">
                    </div>
                    <div id="placeholder-2">
                        <p style="font-weight: 700; color: #fff; margin-bottom: 0.3rem;">클릭하여 2번 사진 업로드</p>
                        <p style="font-size: 0.8rem; color: #aaa;">비교할 대상 인물 사진 등록</p>
                    </div>
                    <input type="file" id="file-input-2" accept="image/*" style="display: none;">
                </label>
            </div>
        </section>

        <!-- 분석 시작 버튼 -->
        <div style="text-align: center;">
            <button id="compare-btn" class="compare-btn" disabled>🚀 두 얼굴 유사도 분석하기</button>
            <div id="loading-spinner" class="spinner-overlay hidden" style="margin-top: 1rem; position: relative; background: transparent;">
                <div class="spinner" style="border-top-color: #FF0080;"></div>
                <p>AI 관상 감정사(InsightFace)가 얼굴 특징점 512개를 정밀 비교하는 중...</p>
            </div>
        </div>

        <!-- 분석 결과 영역 -->
        <section id="result-section" class="similarity-gauge-wrapper hidden">
            <div id="verdict-text" class="verdict-text"></div>
            <div>일치율 (Cosine Similarity Score)</div>
            <div id="sim-percentage" class="sim-percentage">0%</div>
            
            <!-- 네온 게이지 바 -->
            <div class="gauge-bar-bg">
                <div id="gauge-fill" class="gauge-bar-fill"></div>
            </div>

            <!-- 상세 AI 분석 정보 칩 -->
            <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem; font-size: 0.9rem; color: #ccc;">
                <div style="background: rgba(0,0,0,0.3); padding: 0.5rem 1rem; border-radius: 8px;">
                    🤖 YOLO 탐지 물체: <span id="yolo-info" style="color: #00DF89; font-weight: 700;">-</span>
                </div>
                <div style="background: rgba(0,0,0,0.3); padding: 0.5rem 1rem; border-radius: 8px;">
                    👁️ 인식된 얼굴 수: <span id="face-info" style="color: #00F0FF; font-weight: 700;">-</span>
                </div>
            </div>
        </section>
    </main>

    <!-- 얼굴 유사도 전용 자바스크립트 연결 -->
    <script src="/static/face.js"></script>
</body>
</html>
